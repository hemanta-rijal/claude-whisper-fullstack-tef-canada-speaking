name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ── CI: build & verify ────────────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d app"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build (TypeScript)
        run: npm run build

      - name: Run tests
        if: ${{ hashFiles('backend/src/**/*.test.ts', 'backend/src/**/*.spec.ts') != '' }}
        run: npm test

  # ── CD: build & push Docker image ────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CD: deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to server via SSH
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        # Prerequisites (add as repository secrets):
        #   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, SSH_PORT
        # On the server, create an env file at $HOME/tef/.env with:
        #   DATABASE_URL, OPENAI_API_KEY, ANTHROPIC_API_KEY, COOKIE_SECURE, etc.
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE
          script: |
            docker pull "$IMAGE"

            # Shared network so frontend nginx can reach backend by hostname
            docker network create app 2>/dev/null || true

            # Resolve the env file that holds secrets (never commit this to git)
            ENV_FILE_ARG=""
            for path in "$HOME/tef/.env" /etc/tef/.env; do
              if [ -f "$path" ]; then
                ENV_FILE_ARG="--env-file $path"
                break
              fi
            done

            # Remove the old container, then start the new one.
            # docker-entrypoint.sh runs `prisma migrate deploy` before the server starts,
            # so migrations are always applied on container startup — no separate step needed.
            docker rm -f backend 2>/dev/null || true
            docker run -d --name backend --restart unless-stopped \
              --network app \
              $ENV_FILE_ARG \
              "$IMAGE"
