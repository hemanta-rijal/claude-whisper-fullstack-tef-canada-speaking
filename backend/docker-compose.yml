# Optional: local MySQL for development (requires Docker Desktop / Docker Engine).
# From `backend/`: `docker compose up -d`
#
# If you already have MySQL installed locally, you can ignore this file.
services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: devroot
    ports:
      - '3306:3306'
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
