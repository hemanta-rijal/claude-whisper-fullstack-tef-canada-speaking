services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (tsx watch) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://app:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/app
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      COOKIE_SECURE: "false"
      APP_URL: ${APP_URL:-http://localhost:4200}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@tef-canada.app}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      # Preserve container node_modules — don't let host override them
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (ng serve) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
      # Preserve container node_modules — don't let host override them
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
