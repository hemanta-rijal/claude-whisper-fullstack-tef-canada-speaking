# Docker Compose: service name `backend` + internal `PORT` must match `proxy_pass` below
# (defaults: backend:3000 — change both if you remap PORT in compose).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy `/api/*` to Express — strips `/api/` so `/api/assets/...` → upstream `/assets/...`.
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (turn-stream route) — disable buffering so chunks arrive immediately
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Forward cookies transparently
        proxy_pass_header  Set-Cookie;
    }

    # Angular client-side routing — fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html so the browser always fetches the latest shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
